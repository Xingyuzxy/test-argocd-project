apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gitops-service
  namespace: argocd
spec:
  project: default
  
  # 关键点：这里必须是复数 sources，并且下面用 - 开头组成数组
  sources:
    # 1. 第一个源：去公共 Helm 仓库把官方 NGINX 的底座拉下来
    - repoURL: 'https://charts.bitnami.com/bitnami'
      chart: nginx
      targetRevision: 18.2.3  # 固定一个当前（2026年）常用的稳定版本号
      helm:
        valueFiles:
          # 核心桥接：告诉 Argo CD 去下面代号为 "my-values-repo" 的源里找你的配置文件
          - '$my-values-repo/my-k8s-gitops/apps/nginx/my-values.yaml'

    # 2. 第二个源：盯着你自己的 GitHub 仓库，并给它起个别名（ref）叫 my-values-repo
    - repoURL: 'https://github.com/Xingyuzxy/test-argocd-project.git'
      targetRevision: HEAD
      ref: my-values-repo
  
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: default 
    
  syncPolicy:
    automated:
      prune: true    
      selfHeal: true
